name: Deploy Website And Portal

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: patient-gateway-portal/package-lock.json

      - name: Install portal dependencies
        working-directory: patient-gateway-portal
        run: npm ci

      - name: Build portal for GitHub Pages
        working-directory: patient-gateway-portal
        env:
          GITHUB_PAGES: "false"
        run: npm run build

      - name: Assemble deploy artifact
        run: |
          rm -rf .deploy-site
          mkdir -p .deploy-site
          rsync -a main-website/ .deploy-site/
          for page in about services doctors facilities contact; do
            mkdir -p ".deploy-site/$page"
            cp "main-website/$page.html" ".deploy-site/$page/index.html"
            rm -f ".deploy-site/$page.html"
            printf '%s\n' \
              '<!doctype html>' \
              '<html lang="en">' \
              '<head>' \
              '  <meta charset="utf-8">' \
              '  <meta http-equiv="refresh" content="0; url=/'"$page"'/">' \
              '  <link rel="canonical" href="https://www.veludaiyaanhospital.com/'"$page"'/">' \
              '  <meta name="robots" content="noindex, follow">' \
              "  <script>window.location.replace('/$page/');</script>" \
              '  <title>Redirecting...</title>' \
              '</head>' \
              '<body>' \
              '  Redirecting to <a href="/'"$page"'/">/'"$page"'/</a>.' \
              '</body>' \
              '</html>' > ".deploy-site/$page.html"
          done
          mkdir -p .deploy-site/patient
          cp -R patient-gateway-portal/out/patient/. .deploy-site/patient/
          cp -R patient-gateway-portal/out/_next .deploy-site/_next
          cp patient-gateway-portal/out/LOGO.png .deploy-site/LOGO.png
          cp patient-gateway-portal/out/hospital-logo.jpg .deploy-site/hospital-logo.jpg
          cp patient-gateway-portal/out/hospital-logo-mark.jpg .deploy-site/hospital-logo-mark.jpg
          touch .deploy-site/.nojekyll

      - name: Add custom domain CNAME
        run: |
          if [ -n "${{ vars.CUSTOM_DOMAIN }}" ]; then
            echo "${{ vars.CUSTOM_DOMAIN }}" > .deploy-site/CNAME
          else
            echo "www.veludaiyaanhospital.com" > .deploy-site/CNAME
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .deploy-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Notify IndexNow for updated URLs
        run: |
          curl -sS -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "www.veludaiyaanhospital.com",
              "key": "92aa23795db645d2a8d93cfb1e3f377e",
              "keyLocation": "https://www.veludaiyaanhospital.com/92aa23795db645d2a8d93cfb1e3f377e.txt",
              "urlList": [
                "https://www.veludaiyaanhospital.com/",
                "https://www.veludaiyaanhospital.com/about/",
                "https://www.veludaiyaanhospital.com/services/",
                "https://www.veludaiyaanhospital.com/doctors/",
                "https://www.veludaiyaanhospital.com/facilities/",
                "https://www.veludaiyaanhospital.com/contact/"
              ]
            }'
        continue-on-error: true
