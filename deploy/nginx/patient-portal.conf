server {
    listen 80;
    server_name portal.veludaiyaanhospital.com api.veludaiyaanhospital.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name portal.veludaiyaanhospital.com;

    ssl_certificate /etc/letsencrypt/live/portal.veludaiyaanhospital.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.veludaiyaanhospital.com/privkey.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy same-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    root /var/www/veludaiyaan/patient-gateway-portal/out;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    server_name api.veludaiyaanhospital.com;

    ssl_certificate /etc/letsencrypt/live/api.veludaiyaanhospital.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.veludaiyaanhospital.com/privkey.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy same-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 30s;
    }
}
